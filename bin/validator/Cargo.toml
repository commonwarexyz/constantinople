[package]
name = "constantinople-validator"
description = "Constantinople validator binary"
version = "0.0.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
constantinople-engine.workspace = true
constantinople-application.workspace = true
constantinople-mempool.workspace = true
constantinople-primitives.workspace = true
commonware-macros.workspace = true

commonware-codec.workspace = true
commonware-consensus.workspace = true
commonware-cryptography = { workspace = true, features = ["sha2-asm"] }
commonware-deployer.workspace = true
commonware-glue.workspace = true
commonware-p2p.workspace = true
commonware-parallel.workspace = true
commonware-runtime.workspace = true
commonware-utils.workspace = true

axum.workspace = true
bytes.workspace = true
clap = { workspace = true, features = ["derive"] }
serde = { workspace = true, features = ["derive"] }
serde_yaml.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio = { workspace = true, features = ["full"] }
rand_core.workspace = true

[dev-dependencies]
tower = { workspace = true, features = ["util"] }

[[bin]]
name = "constantinople"
path = "src/main.rs"
