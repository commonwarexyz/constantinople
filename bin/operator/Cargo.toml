[package]
name = "constantinople-operator"
description = "Payment channel operator for Constantinople load testing"
version = "0.0.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
# Workspace
constantinople-application.workspace = true
constantinople-engine.workspace = true
constantinople-indexer.workspace = true
constantinople-mempool.workspace = true
constantinople-primitives.workspace = true

# Commonware
commonware-codec.workspace = true
commonware-consensus.workspace = true
commonware-cryptography = { workspace = true, features = ["std", "sha2-asm"] }
commonware-deployer.workspace = true
commonware-formatting.workspace = true
commonware-storage.workspace = true

# Other
axum.workspace = true
clap = { workspace = true, features = ["derive", "std"] }
exoware-qmdb.workspace = true
exoware-sdk.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_yaml.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true
tracing-subscriber.workspace = true

[[bin]]
name = "constantinople-operator"
path = "src/main.rs"
